    - "✨ Added DeepSeek, xAI Grok, MiniMax, Qwen as first-class providers (9 total)"
    - "✨ Updated Claude to 4.6 series (claude-opus-4-6, claude-sonnet-4-6)"
    - "✨ Any future model works automatically without code changes"
    - "🔧 Lazy client initialization — only loads SDKs for providers actually used"
    - "🔧 Unified OpenAI-compat path for DeepSeek, xAI, MiniMax, Qwen, OpenRouter"
    - "📝 Fixed UnisAI branding (was UniAI)"
    - "💰 Updated pricing table with 20 models across 9 providers"
  "1.1.5":
    - "🚀 Updated to latest 2026 models"
    - "✨ GPT-5.2 series (Instant, Thinking, Pro)"
    - "✨ Gemini 3 Pro and 2.5 series"
    - "✨ Claude 4.5 pricing updates"
    - "✨ 10 total models across 3 providers"
  "1.1.0":
    - "✨ Multi-provider support (Claude, GPT, Gemini)"
    - "✨ Cross-provider cost comparison"
    - "✨ Enhanced recommendations engine"
