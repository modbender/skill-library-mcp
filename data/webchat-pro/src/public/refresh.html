<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0">
  <title>Web Chat v15 - 强制刷新测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    .notice { background: #ff9800; color: #000; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="notice">
    <strong>🔄 页面正在强制刷新...</strong><br>
    如果 3 秒后没有自动刷新，请按 Ctrl+Shift+R 强制刷新
  </div>
  
  <script>
    // 清除旧的 localStorage
    localStorage.removeItem('webchat_session_id');
    localStorage.removeItem('webchat_authenticated');
    sessionStorage.clear();
    
    // 3 秒后跳转到主页面
    setTimeout(() => {
      window.location.href = '/';
    }, 3000);
  </script>
</body>
</html>
