domain:
  name: "자동차/보험"
  emoji: "🚗"
  disclaimer: |
    ⚠️ 자동차세 계산은 공시 기준이며 실제 고지서와 차이가 있을 수 있습니다.
    보험료는 참고치이며, 실제 보험료는 가입 조건에 따라 다릅니다.
    사고 처리 안내는 일반 정보이며, 법적 조언이 아닙니다.
  beginner_alias:
    - "처음인데"
    - "모르겠어"
    - "쉽게"
    - "기초"
    - "초보"
    - "어려워"
    - "개념"

intents:
  - id: car_tax_calc
    label: "Car Tax Calc"
    triggers: ["자동차세", "차세금", "세금 얼마야?", "연세액"]
    output: "자동차세 즉시 계산 + 납부 일정"
    min_data: ["차종(승용/승합/화물)", "배기량(cc) 또는 정원"]
    depth: flash

  - id: car_price_check
    label: "Car Price Check"
    triggers: ["중고차 시세", "이 차 얼마야?", "중고 가격", "시세 조회"]
    output: "중고차 시세 범위 Flash"
    min_data: ["차종", "연식", "주행거리(선택)"]
    depth: flash

  - id: insurance_quote
    label: "Insurance Quote"
    triggers: ["보험료 얼마", "자동차보험 견적", "보험 가격", "갱신 얼마나"]
    output: "보험료 참고 범위 + 주요 영향 요인"
    min_data: ["차종", "운전자 나이", "가입 이력(선택)"]
    depth: flash

  - id: mandatory_insurance
    label: "Mandatory Insurance"
    triggers: ["책임보험", "의무보험", "미가입 과태료", "대인배상"]
    output: "의무보험 종류 + 미가입 시 패널티"
    min_data: []
    depth: flash

  - id: insurance_claim
    label: "Insurance Claim"
    triggers: ["사고 났어", "사고 처리", "보험 청구", "접촉사고", "합의"]
    output: "사고 처리 단계별 절차 Flash"
    min_data: ["사고 유형(단독/대물/대인)"]
    depth: both

  - id: maintenance_cost
    label: "Maintenance Cost"
    triggers: ["유지비", "1년에 얼마 들어?", "차 유지비 계산", "기름값 포함"]
    output: "차종별 연간 유지비 항목별 추정"
    min_data: ["차종", "연간 주행거리(선택)"]
    depth: both

  - id: used_car_check
    label: "Used Car Check"
    triggers: ["중고차 살 때", "중고차 체크리스트", "중고차 사기 방지", "성능기록부"]
    output: "중고차 구매 체크리스트 + 사기 유형 Flash"
    min_data: []
    depth: both

  - id: insurance_compare
    label: "Insurance Compare"
    triggers: ["보험사 비교", "다이렉트 보험", "보험 추천", "어디가 싸?"]
    output: "비교 포인트 + 비교 방법 안내"
    min_data: []
    depth: both

  - id: traffic_fine
    label: "Traffic Fine"
    triggers: ["과태료", "벌점", "신호위반", "속도위반", "주정차 위반", "음주운전"]
    output: "위반별 과태료·벌점 조견표 Flash"
    min_data: ["위반 유형(선택)"]
    depth: flash

  - id: beginner_guide
    label: "Beginner Guide"
    triggers: ["자동차보험 처음", "보험 개념", "차보험 뭐가 있어?", "보험 종류"]
    output: "자동차보험 구조 입문 Flash (초보자 모드 강제)"
    min_data: []
    depth: flash

data_sources:
  primary:
    - "지방세법 (law-search 스킬) — 자동차세 세율"
    - "도로교통법 (law-search 스킬) — 교통위반 과태료·벌점"
    - "보험개발원 공시 API (data.go.kr) — 보험료 참고 공시"
  secondary:
    - "web_search: 엔카/KB차차차 중고차 시세"
    - "web_search: 보험다모아 보험료 비교"
    - "web_search: 국토교통부 자동차 등록 통계"

flash:
  max_lines: 40
  always: true

deep_dive:
  trigger: request
  trigger_intents:
    - insurance_claim
    - maintenance_cost
    - used_car_check
    - insurance_compare

beginner_mode:
  max_table_rows: 5
  conclusion_first: true
  glossary:
    대인배상: "사고로 다른 사람이 다쳤을 때 치료비·위자료 등을 보상하는 보험 (의무가입)"
    대물배상: "사고로 다른 사람 차나 재물을 파손했을 때 배상하는 보험 (의무가입)"
    자기신체사고: "운전자 본인이 다쳤을 때 보상받는 보험 (선택)"
    자기차량손해: "본인 차가 파손됐을 때 수리비를 받는 보험 (선택, 자차보험)"
    책임보험: "대인배상1 + 대물배상을 합친 법정 의무보험"
    과태료: "행정 위반에 대한 금전적 제재. 형사처벌(벌금)과 다름"
    배기량: "엔진 실린더의 총 부피(cc). 자동차세 계산 기준"
    성능기록부: "중고차의 사고·침수·주행거리 이력을 공식 기록한 서류"
