domain:
  name: "창업/사업자"
  emoji: "🚀"
  disclaimer: |
    ⚠️ 본 내용은 정보 제공 목적이며, 법적·세무 조언이 아닙니다.
    허가·신고 요건은 변경될 수 있으므로 관할 기관에 최종 확인하세요.
  beginner_alias:
    - "처음인데"
    - "모르겠어"
    - "쉽게"
    - "기초"
    - "초보"
    - "어려워"

intents:
  - id: startup_checklist
    label: "Startup Checklist"
    triggers: ["창업하려면", "뭐부터 해?", "창업 절차", "창업 준비"]
    output: "아이디어 → 사업자등록 → 운영 단계별 체크리스트"
    min_data: ["업종(선택)"]
    depth: both

  - id: business_registration
    label: "Business Registration"
    triggers: ["사업자 등록", "사업자 내는 방법", "홈택스 사업자", "사업자 서류"]
    output: "등록 절차 + 필요 서류 + 소요 기간 Flash"
    min_data: ["사업자 유형(개인/법인)"]
    depth: flash

  - id: license_check
    label: "License Check"
    triggers: ["허가 필요해?", "신고 해야 해?", "인허가", "업종 허가", "이 업종 창업하려면"]
    output: "업종별 허가·신고·등록 요건 + 담당 기관"
    min_data: ["업종명"]
    depth: both

  - id: support_programs
    label: "Support Programs"
    triggers: ["창업지원금", "정책자금", "K-스타트업", "TIPS", "소상공인 지원", "창업 보조금"]
    output: "현재 모집 중인 지원사업 목록 + 신청 방법"
    min_data: ["업종 또는 단계(예비/초기/성장)"]
    depth: both

  - id: business_verify
    label: "Business Verify"
    triggers: ["사업자 번호 확인", "이 회사 살아있어?", "사업자 유효", "폐업했어?"]
    output: "company-info 스킬 호출 → 사업자 상태 조회"
    min_data: ["사업자 번호 10자리"]
    depth: flash

  - id: tax_setup
    label: "Tax Setup"
    triggers: ["창업하면 세금", "부가세 신고", "사업자 세금", "간이과세 일반과세"]
    output: "tax-guide 스킬 연계 (VAT Guide / Withholding Tax 인텐트)"
    min_data: []
    depth: flash

  - id: sole_vs_corp
    label: "Sole vs Corp"
    triggers: ["개인사업자 vs 법인", "법인 설립", "개인이 나아 법인이 나아?", "법인 전환"]
    output: "세금·책임·비용·이미지 4축 비교 Flash"
    min_data: ["연 매출 수준(선택)"]
    depth: both

  - id: startup_cost
    label: "Startup Cost"
    triggers: ["창업 비용", "초기 자금 얼마?", "자본금 얼마?", "창업 자금 계획"]
    output: "업종별 초기 비용 항목 추정 Flash"
    min_data: ["업종"]
    depth: both

  - id: beginner_guide
    label: "Beginner Guide"
    triggers: ["창업 처음인데", "사업자가 뭐야?", "창업 유형", "1인 창업"]
    output: "창업 유형 + 사업자 등록 개념 입문 Flash (초보자 모드 강제)"
    min_data: []
    depth: flash

data_sources:
  primary:
    - "law-search 스킬 — 업종별 허가·신고 법령 (식품위생법, 건축법, 의료법 등)"
    - "company-info 스킬 — 사업자 번호 조회 (NTS API)"
    - "korean-gov-programs 스킬 — 창업 지원사업 목록"
    - "보조금24 API (welfare-guide와 공유) — 사업자 대상 지원금"
  secondary:
    - "web_search: K-스타트업 창업지원사업 공고"
    - "web_search: 소상공인진흥공단 지원사업 2026"
    - "web_search: [업종] 허가 신고 요건"

flash:
  max_lines: 40
  always: true

deep_dive:
  trigger: request
  trigger_intents:
    - startup_checklist
    - license_check
    - sole_vs_corp
    - support_programs
    - startup_cost

beginner_mode:
  max_table_rows: 5
  conclusion_first: true
  glossary:
    개인사업자: "사업주가 개인인 사업 형태. 설립 쉽고 비용 적지만 무한 책임"
    법인사업자: "별도 법인격을 가진 회사 (주식회사 등). 유한 책임이지만 설립 비용 있음"
    사업자등록: "세무서에 사업 개시를 신고하는 절차. 홈택스로 온라인 신청 가능"
    허가: "사업 시작 전 정부의 사전 승인이 필요한 업종 (음식점·의료·건설 등)"
    신고: "허가보다 간단한 의무 통보 절차. 영업 시작 전/후 신고"
    간이과세: "연 매출 1억400만원 이하 소규모 사업자. 부가세 계산 간소화"
    정책자금: "정부가 창업·중소기업에 저금리로 지원하는 대출 또는 보조금"
    TIPS: "민간 투자사가 선발한 스타트업에 정부가 R&D 자금을 매칭 지원하는 프로그램"
