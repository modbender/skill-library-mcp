<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 OpenClaw Chat - 贝贝</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .chat-container {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 20px 20px 0 0;
      text-align: center;
    }
    .chat-header h1 { font-size: 24px; margin-bottom: 5px; }
    .chat-header p { font-size: 14px; opacity: 0.9; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f5f7fb;
    }
    .message {
      margin-bottom: 15px;
      display: flex;
      align-items: flex-start;
    }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .message-content {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 18px;
      word-wrap: break-word;
    }
    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .message-content {
      background: white;
      color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .message-time {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
      text-align: right;
    }
    .chat-input {
      padding: 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
      border-radius: 0 0 20px 20px;
      display: flex;
      gap: 10px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    .chat-input input:focus { border-color: #667eea; }
    .chat-input button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .chat-input button:hover { transform: scale(1.05); }
    .chat-input button:disabled { opacity: 0.6; cursor: not-allowed; }
    .typing-indicator {
      display: inline-block;
      padding: 10px 15px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🦞 OpenClaw Chat</h1>
      <p>与贝贝实时聊天</p>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script>
    const SESSION_ID = 'web-chat-' + Math.random().toString(36).substr(2, 9);
    let lastMessageCount = 0;
    let isWaitingForReply = false;

    // 加载历史消息
    async function loadHistory() {
      try {
        const res = await fetch(`/api/history/${SESSION_ID}`);
        const messages = await res.json();
        console.log('[LOAD]', messages.length, 'messages');
        renderMessages(messages);
        lastMessageCount = messages.length;
      } catch (e) {
        console.error('加载历史失败:', e);
      }
    }

    // 渲染消息
    function renderMessages(messages) {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.role}`;
        div.innerHTML = `
          <div class="message-content">
            ${msg.content.replace(/\n/g, '<br>')}
            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
          </div>
        `;
        container.appendChild(div);
      });
      
      container.scrollTop = container.scrollHeight;
    }

    // 发送消息
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      input.value = '';
      input.disabled = true;
      document.getElementById('sendBtn').disabled = true;
      isWaitingForReply = true;

      // 添加用户消息到界面
      addMessage('user', message);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, sessionId: SESSION_ID })
        });
        const data = await res.json();
        
        // 添加临时回复
        if (data.message) {
          addMessage('assistant', data.message, true);
        }
        
        // 开始轮询新回复
        pollForReply();
      } catch (e) {
        addMessage('assistant', '⚠️ 发送失败：' + e.message);
        input.disabled = false;
        document.getElementById('sendBtn').disabled = false;
        isWaitingForReply = false;
      }
    }

    // 添加消息到界面
    function addMessage(role, content, isTemporary = false) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role} ${isTemporary ? 'temporary' : ''}`;
      div.innerHTML = `
        <div class="message-content">
          ${content.replace(/\n/g, '<br>')}
          <div class="message-time">${new Date().toLocaleTimeString()}</div>
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // 轮询 AI 回复
    async function pollForReply() {
      if (!isWaitingForReply) return;
      
      try {
        const res = await fetch(`/api/history/${SESSION_ID}`);
        const messages = await res.json();
        
        // 检查是否有新消息
        if (messages.length > lastMessageCount) {
          // 有新消息，重新渲染
          renderMessages(messages);
          lastMessageCount = messages.length;
          
          // 检查最后一条是否是 AI 回复
          const lastMsg = messages[messages.length - 1];
          if (lastMsg.role === 'assistant' && !lastMsg.isTemporary) {
            // 收到真实回复，停止轮询
            isWaitingForReply = false;
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            return;
          }
        }
      } catch (e) {
        console.error('轮询失败:', e);
      }
      
      // 继续轮询（最多 30 秒）
      if (isWaitingForReply) {
        setTimeout(pollForReply, 2000);
      } else {
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
      }
    }

    // 定期刷新消息（后台）
    setInterval(async () => {
      if (isWaitingForReply) return; // 轮询中不刷新
      
      try {
        const res = await fetch(`/api/history/${SESSION_ID}`);
        const messages = await res.json();
        
        if (messages.length > lastMessageCount) {
          renderMessages(messages);
          lastMessageCount = messages.length;
        }
      } catch (e) {
        console.error('后台刷新失败:', e);
      }
    }, 5000);

    // 初始化
    loadHistory();
  </script>
</body>
</html>
