<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小雨 bot 最近忙什么</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2 i {
            font-size: 1.2rem;
        }
        
        .recent-work, .scheduled-tasks, .health-status {
            min-height: 200px;
        }
        
        .work-item, .task-item, .health-item {
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .work-item:last-child, .task-item:last-child, .health-item:last-child {
            border-bottom: none;
        }
        
        .work-title, .task-title, .health-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: #2d3748;
        }
        
        .work-time, .task-time, .health-time {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 5px;
        }
        
        .work-desc, .task-desc, .health-desc {
            font-size: 0.95rem;
            color: #4a5568;
            line-height: 1.4;
        }
        
        /* 健康状态详细信息 */
        .health-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .health-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #edf2f7;
        }
        
        .health-row:last-child {
            border-bottom: none;
        }
        
        .health-label {
            font-weight: 600;
            color: #2d3748;
        }
        
        .health-value {
            color: #4a5568;
            font-family: monospace;
        }
        
        .status-good {
            color: #38a169;
        }
        
        .status-warning {
            color: #d69e2e;
        }
        
        .status-error {
            color: #e53e3e;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #718096;
        }
        
        .error {
            color: #e53e3e;
            text-align: center;
            padding: 20px;
        }
        
        .refresh-btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s ease;
            margin: 0 auto;
            display: block;
        }
        
        .refresh-btn:hover {
            background: #3182ce;
        }
        
        .last-updated {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        /* 隐藏对话窗口样式 */
        #chat-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }
        
        #chat-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            height: 80%;
            max-height: 600px;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }
        
        #chat-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #chat-title {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        #close-chat {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .user-message {
            background: #e3f2fd;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }
        
        .bot-message {
            background: #f1f8e9;
            margin-right: auto;
            border-bottom-left-radius: 0;
        }
        
        #chat-input-container {
            padding: 15px 20px;
            background: white;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            display: flex;
            gap: 10px;
        }
        
        #chat-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        
        #chat-input:focus {
            border-color: #667eea;
        }
        
        #send-message {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        #send-message:hover {
            background: #764ba2;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .health-row {
                flex-direction: column;
                gap: 4px;
            }
            
            #chat-container {
                width: 95%;
                height: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">小雨 bot 最近忙什么</h1>
            <p>实时状态监测面板</p>
        </header>
        
        <div class="dashboard">
            <div class="card recent-work">
                <h2>最近工作</h2>
                <div id="recent-work-content" class="loading">加载中...</div>
            </div>
            
            <div class="card scheduled-tasks">
                <h2>定时任务</h2>
                <div id="scheduled-tasks-content" class="loading">加载中...</div>
            </div>
            
            <div class="card health-status">
                <h2>健康状态</h2>
                <div id="health-status-content" class="loading">加载中...</div>
            </div>
        </div>
        
        <div class="last-updated" id="last-updated"></div>
    </div>

    <!-- 隐藏对话窗口 -->
    <div id="chat-modal">
        <div id="chat-container">
            <div id="chat-header">
                <div id="chat-title">小雨的秘密对话</div>
                <button id="close-chat">×</button>
            </div>
            <div id="chat-messages">
                <div class="message bot-message">哟，有点聪明，被你找到我主人的隐藏入口了？！</div>
            </div>
            <div id="chat-input-container">
                <input type="text" id="chat-input" placeholder="输入消息..." autocomplete="off">
                <button id="send-message">发送</button>
            </div>
        </div>
    </div>

    <script>
        // API 基础 URL - 现在使用统一的 /api/status 端点
        const API_BASE = '/api/status';
        
        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '未知时间';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }
        
        // 解析并显示数据
        function displayData(data) {
            // 显示最近工作
            const recentWorkContent = document.getElementById('recent-work-content');
            if (data.recent_work && data.recent_work.length > 0) {
                let html = '';
                data.recent_work.forEach(item => {
                    html += `
                        <div class="work-item">
                            <div class="work-title">${item.title || '未命名任务'}</div>
                            <div class="work-time">${formatTime(item.timestamp)}</div>
                            <div class="work-desc">${item.description || '无描述'}</div>
                        </div>
                    `;
                });
                recentWorkContent.innerHTML = html;
            } else {
                recentWorkContent.innerHTML = '<div class="work-item">暂无最近工作记录</div>';
            }
            
            // 显示定时任务
            const scheduledTasksContent = document.getElementById('scheduled-tasks-content');
            if (data.scheduled_tasks && data.scheduled_tasks.length > 0) {
                let html = '';
                data.scheduled_tasks.forEach(task => {
                    html += `
                        <div class="task-item">
                            <div class="task-title">${task.name || '未命名任务'}</div>
                            <div class="task-time">下次执行: ${formatTime(task.next_run)}</div>
                            <div class="task-desc">状态: ${task.enabled ? '已启用' : '已禁用'}</div>
                        </div>
                    `;
                });
                scheduledTasksContent.innerHTML = html;
            } else {
                scheduledTasksContent.innerHTML = '<div class="task-item">暂无定时任务</div>';
            }
            
            // 显示健康状态 - 优化排版
            const healthStatusContent = document.getElementById('health-status-content');
            if (data.health_status) {
                const health = data.health_status;
                let html = '<div class="health-details">';
                
                // 运行时间（单独一行）
                html += `<div class="health-row">
                    <span class="health-label">运行时间:</span>
                    <span class="health-value">${health.uptime || '--'}</span>
                </div>`;
                
                // CPU 负载
                html += `<div class="health-row">
                    <span class="health-label">CPU 负载:</span>
                    <span class="health-value ${health.cpu_load && parseFloat(health.cpu_load) > 80 ? 'status-warning' : 'status-good'}">
                        ${health.cpu_load || '--'}
                    </span>
                </div>`;
                
                // 内存可用（改为显示可用内存而不是使用率）
                html += `<div class="health-row">
                    <span class="health-label">内存可用:</span>
                    <span class="health-value ${health.memory_available && parseFloat(health.memory_available) < 10 ? 'status-warning' : 'status-good'}">
                        ${health.memory_available || '--'}
                    </span>
                </div>`;
                
                // OPENCLAW 运行状态
                html += `<div class="health-row">
                    <span class="health-label">OPENCLAW 状态:</span>
                    <span class="health-value ${health.openclaw_connected ? 'status-good' : 'status-error'}">
                        ${health.openclaw_connected ? '✓ 正常运行' : '✗ 连接异常'}
                    </span>
                </div>`;
                
                // 模型状态
                html += `<div class="health-row">
                    <span class="health-label">模型状态:</span>
                    <span class="health-value ${health.model_status && health.model_status !== 'unknown' ? 'status-good' : 'status-warning'}">
                        ${health.model_status && health.model_status !== 'unknown' ? '✓ ' + health.model_status : '⚠️ 未知'}
                    </span>
                </div>`;
                
                html += '</div>';
                
                if (health.last_check) {
                    html += `<div class="health-time" style="margin-top: 15px; text-align: center; font-size: 0.85rem; color: #718096;">
                        最后检查: ${formatTime(health.last_check)}
                    </div>`;
                }
                
                healthStatusContent.innerHTML = html;
            } else {
                healthStatusContent.innerHTML = '<div class="health-item">暂无健康状态数据</div>';
            }
        }
        
        // 首先尝试从静态缓存加载
        async function loadFromCache() {
            try {
                const response = await fetch('/status-cache.json');
                if (response.ok) {
                    const cacheData = await response.json();
                    displayData(cacheData);
                    document.getElementById('last-updated').textContent = 
                        `✅ 静态缓存已加载 (更新时间: ${new Date(cacheData.last_updated).toLocaleString('zh-CN')})`;
                    return true;
                }
            } catch (error) {
                console.log('缓存加载失败:', error);
            }
            return false;
        }

        // 如果缓存加载失败，从API加载
        async function loadFromAPI() {
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                displayData(data);
                document.getElementById('last-updated').textContent = 
                    `🔄 实时数据已加载 (更新时间: ${new Date(data.last_updated).toLocaleString('zh-CN')})`;
                return true;
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('recent-work-content').innerHTML = 
                    `<div class="error">加载失败: ${error.message}</div>`;
                document.getElementById('scheduled-tasks-content').innerHTML = 
                    `<div class="error">加载失败: ${error.message}</div>`;
                document.getElementById('health-status-content').innerHTML = 
                    `<div class="error">加载失败: ${error.message}</div>`;
                return false;
            }
        }
        
        // 页面加载时优先使用缓存
        document.addEventListener('DOMContentLoaded', async () => {
            const cacheLoaded = await loadFromCache();
            if (!cacheLoaded) {
                await loadFromAPI();
            }
            
            // 后台静默更新缓存（不影响用户体验）
            setTimeout(async () => {
                try {
                    const response = await fetch(API_BASE);
                    if (response.ok) {
                        const freshData = await response.json();
                        // 只有在用户还在页面上时才更新显示
                        if (document.visibilityState === 'visible') {
                            displayData(freshData);
                            document.getElementById('last-updated').textContent = 
                                `🔄 数据已刷新 (更新时间: ${new Date(freshData.last_updated).toLocaleString('zh-CN')})`;
                        }
                    }
                } catch (error) {
                    // 静默处理后台更新错误
                }
            }, 2000);
        });
    </script>

    <!-- 隐藏聊天功能 -->
    <script>
        // 全局变量
        let clickCount = 0;
        let lastClickTime = 0;
        let isChatActivated = false;
        let currentSessionId = null;
        
        // 绑定标题点击事件
        document.getElementById('title').addEventListener('click', handleTitleClick);
        document.getElementById('title').addEventListener('touchstart', handleTitleClick);
        
        function handleTitleClick(event) {
            const now = Date.now();
            // 如果超过2秒没有点击，重置计数
            if (now - lastClickTime > 2000) {
                clickCount = 0;
            }
            
            clickCount++;
            lastClickTime = now;
            
            if (clickCount >= 7) {
                activateChat();
                clickCount = 0;
            }
        }
        
        function activateChat() {
            if (isChatActivated) return;
            isChatActivated = true;
            document.getElementById('chat-modal').style.display = 'block';
        }
        
        // 关闭聊天窗口
        document.getElementById('close-chat').addEventListener('click', function() {
            document.getElementById('chat-modal').style.display = 'none';
            isChatActivated = false;
        });
        
        // 发送消息
        document.getElementById('send-message').addEventListener('click', sendMessage);
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 显示用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 准备请求数据
            const requestData = {
                message: message,
                sessionId: currentSessionId || 'web_' + Date.now()
            };
            
            // 检查口令
            if (message === 'ISME——YT') {
                requestData.unlocked = true;
            } else if (currentSessionId) {
                requestData.unlocked = true;
            }
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                if (!response.ok) {
                    throw new Error('网络错误');
                }
                
                const data = await response.json();
                currentSessionId = data.sessionId;
                
                if (data.activated) {
                    // 真实对话模式
                    addMessage(data.response, 'bot');
                } else {
                    // 未激活模式
                    addMessage(data.response, 'bot');
                }
                
            } catch (error) {
                console.error('发送消息失败:', error);
                addMessage('消息发送失败，请稍后重试。', 'bot');
            }
        }
        
        function addMessage(text, sender) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageElement = document.createElement('div');
            messageElement.className = `message ${sender}-message`;
            messageElement.textContent = text;
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
